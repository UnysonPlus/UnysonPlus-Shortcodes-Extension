<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Reveal: fade and move in on scroll">
  <style>
    .rv{animation:rv 2.2s ease-in-out infinite}
    @keyframes rv{0%{transform:translateY(16px);opacity:0}30%,70%{transform:translateY(0);opacity:1}100%{transform:translateY(16px);opacity:0}}
  </style>
  <path d="M66 8 v12 M60 14 l6 -6 6 6" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect class="rv" x="44" y="26" width="44" height="28" rx="5" fill="#2f74e6"/>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Reveal</text>
</svg>
