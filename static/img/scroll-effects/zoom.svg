<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Zoom in on scroll">
  <style>.z{animation:z 2.4s ease-out infinite;transform-origin:66px 37px}@keyframes z{0%{transform:scale(.3);opacity:0}40%,78%{transform:scale(1);opacity:1}100%{transform:scale(.3);opacity:0}}</style>
  <rect class="z" x="42" y="20" width="48" height="34" rx="6" fill="#2f74e6"/>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Zoom In</text>
</svg>
