<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Skew settle on scroll">
  <style>.s{animation:s 2.6s ease-out infinite;transform-origin:66px 37px}@keyframes s{0%{transform:skewY(18deg) translateY(14px);opacity:0}45%,80%{transform:skewY(0) translateY(0);opacity:1}100%{transform:skewY(18deg) translateY(14px);opacity:0}}</style>
  <rect class="s" x="42" y="20" width="48" height="34" rx="6" fill="#2f74e6"/>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Skew Settle</text>
</svg>
