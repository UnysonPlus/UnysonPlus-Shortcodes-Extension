<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Stagger: children cascade in">
  <style>
    .r{animation:rr 2.2s ease-in-out infinite}.r2{animation-delay:.2s}.r3{animation-delay:.4s}
    @keyframes rr{0%{transform:translateX(-14px);opacity:0}35%,75%{transform:translateX(0);opacity:1}100%{transform:translateX(-14px);opacity:0}}
  </style>
  <rect class="r"    x="40" y="20" width="52" height="9" rx="4.5" fill="#2f74e6"/>
  <rect class="r r2" x="40" y="34" width="52" height="9" rx="4.5" fill="#2f74e6"/>
  <rect class="r r3" x="40" y="48" width="52" height="9" rx="4.5" fill="#2f74e6"/>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Stagger</text>
</svg>
