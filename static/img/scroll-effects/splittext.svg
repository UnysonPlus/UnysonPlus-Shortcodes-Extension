<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 96" role="img" aria-label="Split Text: characters reveal in sequence">
  <style>
    .c{animation:cc 1.9s ease-in-out infinite}.c2{animation-delay:.1s}.c3{animation-delay:.2s}.c4{animation-delay:.3s}.c5{animation-delay:.4s}
    @keyframes cc{0%{transform:translateY(12px);opacity:0}45%,80%{transform:translateY(0);opacity:1}100%{transform:translateY(12px);opacity:0}}
  </style>
  <rect class="c"    x="34" y="28" width="9" height="26" rx="2" fill="#2f74e6"/>
  <rect class="c c2" x="47" y="28" width="9" height="26" rx="2" fill="#2f74e6"/>
  <rect class="c c3" x="60" y="28" width="9" height="26" rx="2" fill="#2f74e6"/>
  <rect class="c c4" x="73" y="28" width="9" height="26" rx="2" fill="#2f74e6"/>
  <rect class="c c5" x="86" y="28" width="9" height="26" rx="2" fill="#2f74e6"/>
  <text x="66" y="86" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Split Text</text>
</svg>
